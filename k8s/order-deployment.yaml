apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8000"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
    spec:
      containers:
      - name: order-service
        image: edouard15/order-service:latest
        ports:
        - containerPort: 8000
        imagePullPolicy: Always

