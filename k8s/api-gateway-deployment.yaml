apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8000"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
      - name: api-gateway
        image: edouard15/api-gateway:latest
        ports:
        - containerPort: 8000
        imagePullPolicy: Always
