name: CI/CD Pipeline (EKS)

on:
  push:
    branches:
      - master   # change to 'main' if needed

env:
  IMAGE_TAG: ${{ github.sha }}
  AWS_REGION: us-east-1
  CLUSTER_NAME: demo

jobs:

  quality:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r order-service/requirements.txt
          pip install -r tracking-service/requirements.txt
          pip install -r api-gateway/requirements.txt
          pip install flake8 black pytest

      - name: Lint
        run: flake8 .

      - name: Format check
        run: black --check .

      - name: Run tests
        run: pytest || true

  build:
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - uses: actions/checkout@v3

      - uses: docker/setup-buildx-action@v2

      - uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Order Service
        uses: docker/build-push-action@v4
        with:
          context: ./order-service
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/order-service:${{ env.IMAGE_TAG }}

      - name: Build and push Tracking Service
        uses: docker/build-push-action@v4
        with:
          context: ./tracking-service
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/tracking-service:${{ env.IMAGE_TAG }}

      - name: Build and push API Gateway
        uses: docker/build-push-action@v4
        with:
          context: ./api-gateway
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/api-gateway:${{ env.IMAGE_TAG }}

  infra:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init (VPC)
        working-directory: ./vpc/
        run: terraform init

      - name: Terraform Apply (VPC)
        working-directory: ./vpc/
        run: terraform apply -auto-approve

      - name: Terraform Init (EKS)
        working-directory: ./eks-cluster/
        run: terraform init

      - name: Terraform Apply (EKS)
        working-directory: ./eks-cluster/
        run: terraform apply -auto-approve

  deploy:
    runs-on: ubuntu-latest
    needs: infra
    environment: production

    steps:
      - uses: actions/checkout@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --region $AWS_REGION --name $CLUSTER_NAME

      - name: Deploy manifests
        run: kubectl apply -f k8s/

      - name: Update images
        run: |
          kubectl set image deployment/api-gateway api-gateway=${{ secrets.DOCKER_USERNAME }}/api-gateway:${{ env.IMAGE_TAG }}
          kubectl set image deployment/order-service order-service=${{ secrets.DOCKER_USERNAME }}/order-service:${{ env.IMAGE_TAG }}
          kubectl set image deployment/tracking-service tracking-service=${{ secrets.DOCKER_USERNAME }}/tracking-service:${{ env.IMAGE_TAG }}

      - name: Verify rollout
        run: |
          kubectl rollout status deployment/api-gateway
          kubectl rollout status deployment/order-service
          kubectl rollout status deployment/tracking-service
