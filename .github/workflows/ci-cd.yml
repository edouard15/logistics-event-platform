name: CI/CD Pipeline (Production EKS)

on:
  push:
    branches:
      - master

env:
  IMAGE_TAG: ${{ github.sha }}
  AWS_REGION: us-east-1

jobs:

# ---------------- QUALITY ----------------
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install flake8 black pytest
          pip install -r order-service/requirements.txt
          pip install -r tracking-service/requirements.txt
          pip install -r api-gateway/requirements.txt

      - name: Lint
        run: flake8 .

      - name: Format check
        run: black --check .

      - name: Tests
        run: pytest || true


# ---------------- BUILD ----------------
  build:
    runs-on: ubuntu-latest
    needs: quality

    steps:
      - uses: actions/checkout@v3

      - uses: docker/setup-buildx-action@v2

      - uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & push images
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/order-service:${{ env.IMAGE_TAG }} ./order-service
          docker build -t ${{ secrets.DOCKER_USERNAME }}/tracking-service:${{ env.IMAGE_TAG }} ./tracking-service
          docker build -t ${{ secrets.DOCKER_USERNAME }}/api-gateway:${{ env.IMAGE_TAG }} ./api-gateway

          docker push ${{ secrets.DOCKER_USERNAME }}/order-service:${{ env.IMAGE_TAG }}
          docker push ${{ secrets.DOCKER_USERNAME }}/tracking-service:${{ env.IMAGE_TAG }}
          docker push ${{ secrets.DOCKER_USERNAME }}/api-gateway:${{ env.IMAGE_TAG }}


# ---------------- TERRAFORM PLAN ----------------
  terraform-plan:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v3

      - name: AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      # VPC PLAN
      - name: Init VPC
        working-directory: ./vpc
        run: terraform init -reconfigure

      - name: Plan VPC
        working-directory: ./vpc
        run: terraform plan

      # EKS PLAN
      - name: Init EKS
        working-directory: ./eks-cluster
        run: terraform init -reconfigure

      - name: Plan EKS
        working-directory: ./eks-cluster
        run: terraform plan


# ---------------- TERRAFORM APPLY ----------------
  terraform-apply:
    runs-on: ubuntu-latest
    needs: terraform-plan

    steps:
      - uses: actions/checkout@v3

      - name: AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      # APPLY VPC FIRST
      - name: Apply VPC
        working-directory: ./vpc
        run: terraform apply -auto-approve

      # WAIT FOR AWS PROPAGATION (important for EKS stability)
      - name: Wait for VPC propagation
        run: sleep 30

      # APPLY EKS
      - name: Apply EKS
        working-directory: ./eks-cluster
        run: terraform apply -auto-approve


# ---------------- DEPLOY ----------------
  deploy:
    runs-on: ubuntu-latest
    needs: terraform-apply

    steps:
      - uses: actions/checkout@v3

      - name: AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install kubectl
        uses: azure/setup-kubectl@v4

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --region $AWS_REGION --name logistics

      - name: Validate cluster
        run: kubectl get nodes

      - name: Deploy manifests
        run: kubectl apply -f k8s/

      - name: Update images
        run: |
          kubectl set image deployment/api-gateway api-gateway=${{ secrets.DOCKER_USERNAME }}/api-gateway:${{ env.IMAGE_TAG }}
          kubectl set image deployment/order-service order-service=${{ secrets.DOCKER_USERNAME }}/order-service:${{ env.IMAGE_TAG }}
          kubectl set image deployment/tracking-service tracking-service=${{ secrets.DOCKER_USERNAME }}/tracking-service:${{ env.IMAGE_TAG }}

      - name: Verify rollout
        run: |
          kubectl rollout status deployment/api-gateway
          kubectl rollout status deployment/order-service
          kubectl rollout status deployment/tracking-service
