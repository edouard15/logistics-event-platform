name: CI/CD Pipeline

on:
  push:
    branches:
      - master

env:
  IMAGE_TAG: ${{ github.sha }}

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        pip install -r order-service/requirements.txt
        pip install -r tracking-service/requirements.txt
        pip install -r api-gateway/requirements.txt
        pip install flake8 black pytest

    - name: Lint
      run: flake8 .

    - name: Format check
      run: black --check .

    - name: Run tests
      run: pytest || true   # remove '|| true' once tests exist

  build:
    runs-on: ubuntu-latest
    needs: quality

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and push Order Service
      uses: docker/build-push-action@v4
      with:
        context: ./order-service
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/order-service:${{ env.IMAGE_TAG }}

    - name: Build and push Tracking Service
      uses: docker/build-push-action@v4
      with:
        context: ./tracking-service
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/tracking-service:${{ env.IMAGE_TAG }}

    - name: Build and push API Gateway
      uses: docker/build-push-action@v4
      with:
        context: ./api-gateway
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/api-gateway:${{ env.IMAGE_TAG }}

  deploy:
    runs-on: ubuntu-latest
    needs: build
    environment: production   # enables approval if configured

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup Minikube
      uses: medyagh/setup-minikube@latest

    - name: Deploy manifests
      run: kubectl apply -f k8s/

    - name: Update images (no 'latest')
      run: |
        kubectl set image deployment/api-gateway api-gateway=${{ secrets.DOCKER_USERNAME }}/api-gateway:${{ env.IMAGE_TAG }}
        kubectl set image deployment/order-service order-service=${{ secrets.DOCKER_USERNAME }}/order-service:${{ env.IMAGE_TAG }}
        kubectl set image deployment/tracking-service tracking-service=${{ secrets.DOCKER_USERNAME }}/tracking-service:${{ env.IMAGE_TAG }}

    - name: Verify rollout
      run: |
        kubectl rollout status deployment/api-gateway
        kubectl rollout status deployment/order-service
        kubectl rollout status deployment/tracking-service
