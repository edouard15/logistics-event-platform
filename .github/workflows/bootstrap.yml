name: Terraform Bootstrap (Backend Setup)

on:
workflow_dispatch:   # manual trigger ONLY (important safety)

env:
AWS_REGION: us-east-1

jobs:
bootstrap:
runs-on: ubuntu-latest

```
steps:
  - name: Checkout code
    uses: actions/checkout@v3

  - name: Configure AWS credentials
    uses: aws-actions/configure-aws-credentials@v4
    with:
      aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
      aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      aws-region: ${{ env.AWS_REGION }}

  - name: Setup Terraform
    uses: hashicorp/setup-terraform@v3

  - name: Terraform Init (Bootstrap)
    working-directory: ./backend-bootstrap
    run: terraform init

  - name: Terraform Apply (Create S3 + DynamoDB)
    working-directory: ./backend-bootstrap
    run: terraform apply -auto-approve

  - name: Output confirmation
    run: echo "Backend infrastructure created successfully"
```

