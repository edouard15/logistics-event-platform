name: CI - Build Docker Images

on:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2

    - name: Login to Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    - name: Build and push Order Service
      uses: docker/build-push-action@v4
      with:
        context: ./order-service
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/order-service:latest

    - name: Build and push Tracking Service
      uses: docker/build-push-action@v4
      with:
        context: ./tracking-service
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/tracking-service:latest

    - name: Build and push API Gateway
      uses: docker/build-push-action@v4
      with:
        context: ./api-gateway
        push: true
        tags: ${{ secrets.DOCKER_USERNAME }}/api-gateway:latest
